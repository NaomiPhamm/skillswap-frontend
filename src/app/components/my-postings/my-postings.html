<div class="my-postings-page">
  <div class="page-header">
    <h2>My Postings</h2>
    <p>Manage the jobs you have posted on SkillSwap.</p>
  </div>

  <p class="error-text">{{ errorMessage }}</p>

  <div class="empty-box" *ngIf="jobs.length === 0">
    <p>You have not posted any jobs yet.</p>
  </div>

  <div class="postings-grid">
    <div class="posting-card" *ngFor="let job of jobs">
      <h3>
        <a [routerLink]="['/jobs', job.id]">{{ job.title }}</a>
      </h3>

      <p class="job-description">
        {{ job.description || 'No description provided.' }}
      </p>

      <p><strong>Category:</strong> {{ job.category || 'N/A' }}</p>
      <p><strong>Budget:</strong> {{ job.budget }}</p>
      <p>
        <strong>Status:</strong>
        <span class="status-badge">{{ job.status }}</span>
      </p>
    </div>
  </div>
</div>
