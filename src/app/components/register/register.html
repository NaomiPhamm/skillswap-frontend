<div class="register-container">

  <div class="register-card">

    <h2 class="title">Create Account</h2>

    <form (ngSubmit)="submit()">

      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          name="name"
          [(ngModel)]="name"
          required
        >
      </div>

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
        >
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
        >
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        >
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea
          name="bio"
          [(ngModel)]="bio"
          rows="4"
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label>Skills (comma separated)</label>
        <input
          type="text"
          name="skillsText"
          [(ngModel)]="skillsText"
          placeholder="Angular, TypeScript, HTML"
          required
        >
      </div>

      <button type="submit">
        Register
      </button>

    </form>

    <p class="success-message">
      {{ successMessage }}
    </p>

    <p class="error-message">
      {{ errorMessage }}
    </p>

    @if (suggestedUsername) {
      <p class="suggestion-message">
        Suggested username: {{ suggestedUsername }}
      </p>
    }

  </div>

</div>
