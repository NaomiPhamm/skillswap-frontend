<div class="platform-page">
  <h2>Platform Stats</h2>

  <p class="error-text">{{ errorMessage }}</p>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Users</h3>
      <p>{{ totalUsers }}</p>
    </div>

    <div class="stat-card">
      <h3>Active Jobs</h3>
      <p>{{ activeJobs }}</p>
    </div>

    <div class="stat-card">
      <h3>Total Value Moved</h3>
      <p>{{ totalValueMoved }}</p>
    </div>
  </div>
</div>
